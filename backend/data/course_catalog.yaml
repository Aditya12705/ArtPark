    requires: [agile_scrum]
    description: "Google's PM certificate covering initiation, planning, execution, risk, and Agile project management."

  - id: stakeholder_pro
    title: "Stakeholder Management & Executive Communication"
    provider: LinkedIn Learning
    url: "https://www.linkedin.com/learning/stakeholder-management"
    duration_hours: 6
    level: intermediate
    teaches: [stakeholder_management]
    requires: [project_management]
    description: "Teaches techniques for mapping stakeholders, managing expectations, and delivering impactful executive updates."

  - id: leadership_eng
    title: "Engineering Leadership & Team Management"
    provider: Reforge
    url: "https://www.reforge.com/programs/engineering-leadership"
    duration_hours: 20
    level: advanced
    teaches: [team_leadership]
    requires: [project_management, communication_fundamentals]
    description: "Practical program for senior engineers and leads covering mentoring, delegation, 1-on-1s, and building team culture."
