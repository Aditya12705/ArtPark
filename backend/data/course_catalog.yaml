  - id: tech_writing_101
    title: "Technical Writing for Engineers"
    provider: Google (free)
    url: "https://developers.google.com/tech-writing"
    duration_hours: 8
    level: beginner
    teaches: [technical_writing]
    requires: [communication_fundamentals]
    description: "Google's free course teaching engineers to write clear documentation, API guides, and technical specifications."

  - id: pm_101
    title: "Project Management Fundamentals"
    provider: PMI / Coursera
    url: "https://www.coursera.org/professional-certificates/google-project-management"
    duration_hours: 180
    level: beginner
